<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商城界面还原</title>
    <!-- 引入Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入Font Awesome图标 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* 自定义少量样式补充Tailwind */
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        /* 底部导航图标样式 */
        .nav-icon {
            width: 24px;
            height: 24px;
            margin: 0 auto 4px;
        }
        /* 预览模式标识样式 */
        .preview-badge {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background-color: rgba(0, 0, 0, 0.8);
            color: white;
            text-align: center;
            padding: 8px;
            font-size: 14px;
            font-weight: bold;
            z-index: 1000;
        }
    </style>
</head>
<body class="bg-gray-100 font-sans">
    <!-- 预览模式标识 -->
    <div class="preview-badge">预览模式</div>
    <!-- 状态栏 -->
    <div class="bg-white px-4 py-2 flex justify-between items-center text-sm">
        <span class="font-medium">12:22</span>
        <div class="flex items-center gap-2">
            <span>8.1K/s</span>
            <span>4G</span>
            <span>85%</span>
        </div>
    </div>

    <!-- 顶部搜索栏 -->
    <div class="bg-white px-4 py-3 flex items-center justify-between">
        <!-- 搜索框 -->
        <div class="relative flex-1 max-w-[70%]">
            <i class="fa-solid fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
            <input type="text" placeholder="搜索" class="w-full pl-10 pr-4 py-2 rounded-lg bg-gray-100 text-gray-600">
        </div>
        <!-- 地区选择 -->
        <div class="flex items-center mx-2">
            <img src="https://flagcdn.com/w20/my.png" alt="Malaysia" class="w-5 h-3.5 mr-1">
            <span class="text-gray-800">Malaysia</span>
            <i class="fa-solid fa-chevron-down text-xs ml-1 text-gray-500"></i>
        </div>
        <!-- 功能图标 -->
        <div class="flex items-center gap-3">
            <i class="fa-solid fa-cart-shopping text-xl text-gray-700"></i>
            <i class="fa-solid fa-qrcode text-xl text-gray-700"></i>
        </div>
    </div>

    <!-- 积分&优惠券卡片 -->
    <div class="bg-white px-4 py-3 mt-2">
        <div class="grid grid-cols-2 gap-3">
            <!-- PRP积分卡片 -->
            <div class="bg-gradient-to-r from-cyan-100 to-blue-200 rounded-xl p-4 relative overflow-hidden">
                <div class="text-gray-700 text-sm mb-1">PRP积分</div>
                <div class="text-3xl font-bold text-gray-900 mb-2">533.00</div>
                <a href="#" class="text-blue-700 text-sm flex items-center">
                    查看详情 <i class="fa-solid fa-chevron-right ml-1 text-xs"></i>
                </a>
                <i class="fa-solid fa-star absolute right-3 bottom-3 text-white/50 text-xs"></i>
            </div>
            <!-- 优惠券卡片 -->
            <div class="bg-gradient-to-r from-yellow-100 to-orange-200 rounded-xl p-4 relative overflow-hidden">
                <div class="text-gray-700 text-sm mb-1">已领取的优惠券</div>
                <div class="text-3xl font-bold text-gray-900 mb-2">5</div>
                <a href="#" class="text-blue-700 text-sm flex items-center">
                    查看详情 <i class="fa-solid fa-chevron-right ml-1 text-xs"></i>
                </a>
                <i class="fa-solid fa-tags absolute right-3 bottom-3 text-white/50 text-xs"></i>
            </div>
        </div>
    </div>

    <!-- 分类标签 -->
    <div class="bg-white px-4 mt-2">
        <div class="flex items-center overflow-x-auto scrollbar-hide py-3 gap-6">
            <div class="text-blue-700 font-medium border-b-2 border-blue-700 pb-1 whitespace-nowrap">全部</div>
            <div class="text-gray-400 whitespace-nowrap">ELKEN</div>
            <div class="text-gray-400 whitespace-nowrap">ELYSYLE</div>
            <div class="text-gray-400 whitespace-nowrap">FMCG</div>
            <i class="fa-solid fa-sliders text-gray-400 ml-2"></i>
        </div>
    </div>

    <!-- 商品列表 -->
    <div class="bg-white px-4 pb-20">
        <div class="grid grid-cols-2 gap-4 pt-2">
            <!-- 商品1 -->
            <div class="bg-white rounded-lg overflow-hidden shadow-sm">
                <img src="https://picsum.photos/seed/test1/300/200" alt="测试商品" class="w-full h-40 object-cover">
                <div class="p-3">
                    <div class="text-gray-800 font-medium mb-2">测试</div>
                    <div class="flex justify-between items-center mb-4">
                        <div class="text-sm text-gray-500">
                            <div>MYR</div>
                            <div>BV</div>
                        </div>
                        <div class="text-right text-sm font-medium">
                            <div class="text-blue-800">1011.00</div>
                            <div class="text-blue-800">86.00</div>
                        </div>
                    </div>
                    <button class="w-full bg-blue-900 text-white py-2 rounded-lg font-medium">加入购物车</button>
                </div>
            </div>
            <!-- 商品2 -->
            <div class="bg-white rounded-lg overflow-hidden shadow-sm">
                <img src="https://picsum.photos/seed/test2/300/200" alt="ttt商品" class="w-full h-40 object-cover">
                <div class="p-3">
                    <div class="text-gray-800 font-medium mb-2">ttt</div>
                    <div class="flex justify-between items-center mb-4">
                        <div class="text-sm text-gray-500">
                            <div>MYR</div>
                            <div>BV</div>
                        </div>
                        <div class="text-right text-sm font-medium">
                            <div class="text-blue-800">1011.00</div>
                            <div class="text-blue-800">86.00</div>
                        </div>
                    </div>
                    <button class="w-full bg-blue-900 text-white py-2 rounded-lg font-medium">加入购物车</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 底部导航栏 -->
    <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 py-2 px-6">
        <div class="grid grid-cols-4 gap-2 text-center">
            <!-- 商城 -->
            <div class="flex flex-col items-center text-blue-700">
                <div class="nav-icon flex items-center justify-center">
                    <i class="fa-solid fa-store text-lg"></i>
                </div>
                <span class="text-xs">商城</span>
            </div>
            <!-- 资讯中心 -->
            <div class="flex flex-col items-center text-gray-400">
                <div class="nav-icon flex items-center justify-center">
                    <i class="fa-solid fa-newspaper text-lg"></i>
                </div>
                <span class="text-xs">资讯中心</span>
            </div>
            <!-- 事业中心 -->
            <div class="flex flex-col items-center text-gray-400">
                <div class="nav-icon flex items-center justify-center">
                    <i class="fa-solid fa-briefcase text-lg"></i>
                </div>
                <span class="text-xs">事业中心</span>
            </div>
            <!-- 个人中心 -->
            <div class="flex flex-col items-center text-gray-400">
                <div class="nav-icon flex items-center justify-center">
                    <i class="fa-solid fa-user text-lg"></i>
                </div>
                <span class="text-xs">个人中心</span>
            </div>
        </div>
    </div>
</body>
</html>
